apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: jsw-db
  namespace: ${NAMESPACE}
spec:
  serviceName: jsw-db
  replicas: 1
  selector:
    matchLabels:
      app: jsw-db
  template:
    metadata:
      labels:
        app: jsw-db
    spec:
      containers:
        - name: mariadb
          image: mariadb:10.11
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jsw-app-secret
                  key: DB_PASSWORD
            - name: MARIADB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: jsw-app-secret
                  key: DB_NAME
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mariadb-admin ping -h 127.0.0.1 -uroot -p"${MARIADB_ROOT_PASSWORD}"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mariadb-admin ping -h 127.0.0.1 -uroot -p"${MARIADB_ROOT_PASSWORD}"
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/mysql
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
      volumes:
        - name: init-sql
          configMap:
            name: jsw-init-sql
  volumeClaimTemplates:
    - metadata:
        name: db-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: ${DB_STORAGE_CLASS}
        resources:
          requests:
            storage: ${DB_STORAGE_SIZE}

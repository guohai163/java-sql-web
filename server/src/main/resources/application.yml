server:
  port: ${SERVER_PORT:8002}
  tomcat:
    uri-encoding: UTF-8
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:${MARIADB_PORT_3306_TCP_ADDR:localhost}}:${DB_PORT:3306}/${DB_NAME:javasqlweb_db}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Hongkong
    username: ${DB_USERNAME:${MARIADB_ENV_MYSQL_ROOT_NAME:root}}
    password: ${DB_PASSWORD:${MARIADB_ENV_MYSQL_ROOT_PASSWORD:Passw0rd}}
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
mybatis:
  configuration:
    map-underscore-to-camel-case: true
project:
  version: ${PROJECT_VERSION:@project.version@}
  limit: ${PROJECT_LIMIT:20000}
  signkey: ${PROJECT_SIGNKEY:jsw}
  domain: ${PROJECT_DOMAIN:localhost}
  host: ${PROJECT_HOST:http://localhost}
  auto-user-link-enabled: ${PROJECT_AUTO_USER_LINK_ENABLED:false}
  legacy-tls-enabled: ${PROJECT_LEGACY_TLS_ENABLED:false}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never
logging:
  level:
    org:
      guohai: DEBUG
